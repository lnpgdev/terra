<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Terra — Component Preview</title>
    <script type="module" src="/src/index.ts"></script>
  </head>
  <body class="p-4">
    <h1 class="mb-4">Terra Component Preview</h1>

    <!-- ------------------------------------------------------------------ -->
    <!-- Spinner                                                              -->
    <!-- ------------------------------------------------------------------ -->
    <section class="mb-5">
      <h2 class="mb-3">Spinner</h2>

      <h6 class="text-muted mb-2">Default</h6>
      <div class="d-flex align-items-center gap-3 mb-4">
        <div class="spinner-border" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>

      <h6 class="text-muted mb-2">Colours</h6>
      <div class="d-flex align-items-center gap-3 mb-4">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
        <div class="spinner-border text-success" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
        <div class="spinner-border text-danger" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
        <div class="spinner-border text-warning" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>

      <h6 class="text-muted mb-2">Sizes</h6>
      <div class="d-flex align-items-center gap-3 mb-4">
        <div class="spinner-border" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
        <div class="spinner-border spinner-border-sm" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>

      <h6 class="text-muted mb-2">Grow variant</h6>
      <div class="d-flex align-items-center gap-3">
        <div class="spinner-grow" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
        <div class="spinner-grow spinner-grow-sm" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>
    </section>
    <!-- ------------------------------------------------------------------ -->
    <!-- Horizontal Rule                                                      -->
    <!-- ------------------------------------------------------------------ -->
    <section class="mb-5">
      <h2 class="mb-3">Horizontal Rule</h2>

      <h6 class="text-muted mb-2">Default</h6>
      <hr class="mb-4" />

      <h6 class="text-muted mb-2">Tones</h6>
      <hr class="hr-success" />
      <hr class="hr-danger" />
      <hr class="hr-warning" />
      <hr class="hr-dark mb-4" />

      <h6 class="text-muted mb-2">Sizes</h6>
      <hr class="hr-sm" />
      <hr class="hr-md" />
      <hr class="hr-lg mb-4" />

      <h6 class="text-muted mb-2">Combined</h6>
      <hr class="hr-success hr-lg" />
      <hr class="hr-danger hr-md" />
      <hr class="hr-warning hr-sm" />
    </section>

    <!-- ------------------------------------------------------------------ -->
    <!-- Placeholder                                                          -->
    <!-- ------------------------------------------------------------------ -->
    <section class="mb-5">
      <h2 class="mb-3">Placeholder</h2>

      <h6 class="text-muted mb-2">Default (glow animation)</h6>
      <p class="placeholder-glow mb-4">
        <span class="placeholder col-12 mb-2"></span>
        <span class="placeholder col-8 mb-2"></span>
        <span class="placeholder col-10"></span>
      </p>

      <h6 class="text-muted mb-2">Wave animation</h6>
      <p class="placeholder-wave mb-4">
        <span class="placeholder col-12 mb-2"></span>
        <span class="placeholder col-8 mb-2"></span>
        <span class="placeholder col-10"></span>
      </p>

      <h6 class="text-muted mb-2">Shapes</h6>
      <div class="d-flex align-items-end gap-3">
        <span class="placeholder placeholder-circle" style="width: 4rem"></span>
        <span class="placeholder placeholder-square" style="width: 4rem"></span>
        <span class="placeholder placeholder-triangle" style="width: 4rem"></span>
      </div>
    </section>
  </body>
</html>
