<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Terra — Component Preview</title>
    <script type="module" src="/src/index.ts"></script>
  </head>
  <body class="p-4">

    <h1 class="mb-4">Terra Component Preview</h1>

    <!-- ------------------------------------------------------------------ -->
    <!-- Spinner                                                              -->
    <!-- ------------------------------------------------------------------ -->
    <section class="mb-5">
      <h2 class="mb-3">Spinner</h2>

      <h6 class="text-muted mb-2">Default</h6>
      <div class="d-flex align-items-center gap-3 mb-4">
        <div class="spinner-border" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>

      <h6 class="text-muted mb-2">Colours</h6>
      <div class="d-flex align-items-center gap-3 mb-4">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
        <div class="spinner-border text-success" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
        <div class="spinner-border text-danger" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
        <div class="spinner-border text-warning" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>

      <h6 class="text-muted mb-2">Sizes</h6>
      <div class="d-flex align-items-center gap-3 mb-4">
        <div class="spinner-border" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
        <div class="spinner-border spinner-border-sm" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>

      <h6 class="text-muted mb-2">Grow variant</h6>
      <div class="d-flex align-items-center gap-3">
        <div class="spinner-grow" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
        <div class="spinner-grow spinner-grow-sm" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>
    </section>

  </body>
</html>
